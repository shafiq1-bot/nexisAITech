# Google Cloud Build Pipeline Configuration for Nexis AI (nexisai.us)
# Automates container build, Artifact Registry push, and Cloud Run deployment

steps:
  # Step 1: Build Docker Image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nexisai-web:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nexisai-web:latest'
      - '.'

  # Step 2: Push Container Image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/nexisai-web:latest'

  # Step 3: Deploy Service to Google Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nexisai-service'
      - '--image=gcr.io/$PROJECT_ID/nexisai-web:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--min-instances=0'
      - '--max-instances=10'
      - '--cpu=1'
      - '--memory=512Mi'

images:
  - 'gcr.io/$PROJECT_ID/nexisai-web:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nexisai-web:latest'

timeout: '1200s'
